<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise 🎂</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
}

/* page system */

.page{
display:none;
height:100vh;
padding:20px;
box-sizing:border-box;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* phone friendly text */

h1{
font-size:8vw;
margin:10px;
}

p{
font-size:5vw;
max-width:90%;
}

/* buttons */

button{
padding:14px 26px;
font-size:5vw;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
background:white;
color:#ff4d6d;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button:active{
transform:scale(0.95);
}

/* cake */

.cake{
font-size:25vw;
margin-top:10px;
}

/* balloons */

.balloon{
position:absolute;
font-size:10vw;
animation:float 10s linear infinite;
}
/* IMAGE */

img{
width:80%;
max-width:300px;
height:auto;
margin:20px auto;
display:block;
border-radius:15px;
}


@keyframes float{
0%{transform:translateY(0vh);}
100%{transform:translateY(-120vh);}
}

/* confetti */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
opacity:0.9;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}

/* image area */

.message-img{
width:80%;
max-width:320px;
border-radius:15px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

    <audio autoplay loop muted id="bgmusic">
    <source src="IMAGE\PIANO.mpeg (2).mp3" type="audio/mpeg">
    </audio>
        

<!-- PAGE 1 -->

<div class="page active" id="page1">

<h1>Hey Kunkuni..(lol)</h1>

<p>Here's a small surprise for you...</p>
<img src="IMAGE\BS1.webp">

<button onclick="playMusic(); nextPage(2)">Click Here 🎁</button>

</div>


<!-- PAGE 2 -->

<div class="page" id="page2">

<h1>Wait wait!! 🤨</h1>
<img src="IMAGE\BS8.webp">


<p>Do you know what day it is today??..</p>

<button onclick="nextPage(3)">Yesss 😎</button>

<button onclick="alert('HOW DO YOU NOT KNOW??.. 😂')">Nooo 🤔</button>

</div>


<!-- PAGE 3 -->

<div class="page" id="page3">

<h1>OFC IT'S YOUR BIRTHDAY!!!🎉</h1>


<img src="IMAGE\BS2.webp">

<button onclick="confettiExplosion(); nextPage(4)">
Let's Celebrate 🎈
</button>

</div>


<!-- PAGE 4 -->

<div class="page" id="page4">

<h1>Happy Birthday ANNIE 🎂</h1>

<div class="cake">🎂</div>

<button onclick="candles()">Light Candles 🕯️</button>

<button onclick="balloons()">Release Balloons 🎈</button>

<button onclick="nextPage(5)">Final Message ✉</button>

</div>


<!-- PAGE 5 -->

<div class="page" id="page5">

<h1 style="font-size: 30px;">A letter For You 📜</h1>



<!-- IMAGE OPTION -->

<img src="IMAGE\BS-WISH.jpeg" class="message-img" height="500px" width="300px">

</div>



<script>
function playMusic(){
document.getElementById("bgmusic").muted = false;
document.getElementById("bgmusic").volume = 0.9;
document.getElementById("bgmusic").play();

}
/* page switch */

function nextPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById("page"+page).classList.add("active")

}


/* candles */

function candles(){
alert("Candles are glowing ✨ Make a wish! Click OK to blowww..")
}


/* balloons */

function balloons(){

for(let i=0;i<20;i++){

let balloon=document.createElement("div")

balloon.className="balloon"

balloon.innerHTML="🎈"

balloon.style.left=Math.random()*100+"vw"

balloon.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(balloon)

}

}


/* confetti */

function confettiExplosion(){

const colors=["red","blue","yellow","green","purple","orange","pink"]

for(let i=0;i<120;i++){

let confetti=document.createElement("div")

confetti.className="confetti"

confetti.style.left=Math.random()*100+"vw"

confetti.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)]

confetti.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(confetti)

}

}

</script>

</body>
</html>
